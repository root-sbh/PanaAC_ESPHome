esphome:
  name: esphome-web-4d5678
  friendly_name: ESPHome-Bedroom
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf

# Enable logging
logger:
  level: VERBOSE

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: git
      # url: https://github.com/hoangminh1109/PanaAC_ESPHome.git
      url: https://github.com/root-sbh/PanaAC_ESPHome.git
      ref: test2
    components: all
    refresh: 0d

remote_receiver:
  pin:
    number: GPIO35
    inverted: True
  tolerance: 55%
  id: ir_receiver
  idle: 5ms # required

remote_transmitter:
  carrier_duty_percent: 50%
  pin:
    number: GPIO32

climate:
  - platform: panaac
    name: "CS-228CGX"
    receiver_id: ir_receiver
    supports_fan_only: true
    supports_heat: true
    supports_quiet: true
    swing_horizontal: true
    temp_step: 0.5
    #fan_level_steps: 4
    #supports_nanoex:
    #  name: "Nanoe X"
    ir_control: true